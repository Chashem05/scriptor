databases:
  - name: scriptor-db
    plan: free

services:
  - type: web
    name: scriptor
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npx prisma db push && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: scriptor-db
          property: connectionString
      - key: NEXTAUTH_URL
        value: https://scriptor.onrender.com
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
